services:
  postgres:
    image: postgres:16-alpine
    container_name: support_bot_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-support_bot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-support_bot_password}
      POSTGRES_DB: ${POSTGRES_DB:-support_bot}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-support_bot}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - support_bot_network

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: support_bot
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
      - ./exports:/app/exports
    networks:
      - support_bot_network

volumes:
  postgres_data:

networks:
  support_bot_network:
    driver: bridge
